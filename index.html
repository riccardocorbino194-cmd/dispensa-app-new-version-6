        /* \u2500\u2500 MOBILE (iPhone) \u2500\u2500 */
        @media(max-width:600px){
          .dashboard-row{flex-direction:column!important;}
          .overlay-topbar{padding:12px 16px!important;}
          .overlay-content{padding:16px 14px!important;}
          .col-headers{display:none!important;}

          /* Header */
          .app-header{padding:20px 16px 16px!important;}
          .app-header h1{font-size:22px!important;}
          .app-header .subtitle{font-size:11px!important;}
          .app-date{display:none!important;}

          /* Dashboard padding */
          .dashboard-wrap{padding:14px 12px!important;}

          /* Cards */
          .card-inner{padding:16px 14px 14px!important; border-radius:12px!important;}

          /* Recipe grid: 1 column on mobile */
          .recipe-grid{grid-template-columns:1fr!important;}

          /* Recipe detail overlay */
          .recipe-detail-content{padding:20px 14px!important;}
          .recipe-detail-topbar{padding:12px 14px!important; flex-wrap:wrap!important; gap:8px!important;}
          .recipe-detail-topbar button{font-size:13px!important; padding:6px 10px!important;}
          .ingredient-grid{grid-template-columns:1fr!important;}
          .recipe-detail-title{font-size:22px!important;}

          /* Pantry/Grocery rows */
          .item-row{flex-wrap:wrap!important; gap:6px!important;}
          .item-row .expiry-badge{display:none!important;}

          /* Sort/filter bar */
          .controls-bar{flex-wrap:wrap!important; gap:6px!important;}
          .controls-bar button{font-size:13px!important; padding:6px 10px!important;}

          /* Add item form */
          .add-form{flex-wrap:wrap!important;}
          .add-form input, .add-form select{font-size:14px!important;}

          /* Recipe form */
          .recipe-form-grid{grid-template-columns:1fr!important;}

          /* Overlay top bar buttons wrap */

fette - Pane","Q.B - Ricotta","Q.B - Prosciutto crudo","Q.B - Fichi","Q.B - Noci","Q.B - Miele","Q.B - Olio d'oliva","Q.B - Sale"],steps:["Tagliare il pane a fette; tostare/grigliare le fette su entrambi i lati fino a doratura.","Tagliare i fichi a spicchi e riscaldare in un pentolino con del miele a fuoco medio/basso.","Spalmare la ricotta sulle fette tostate di pane.","Versare un filo d'olio e un pizzico di sale sulla ricotta.","Posizionare una fetta di prosciutto su ogni fetta di pane.","Mettere un po' di fichi caldi con il miele sulle fette di pane.","Spezzettare un po' di noci da mettere sulle bruschette (se desiderato).","Servire subito, calda o tiepida."],notes:null,image:null},{id:9003,custom:!0,mealType:"Pranzo/Cena",name:"Rag\xF9 alla Bolognese",time:"2 h 40 min",difficulty:"Media",description:"Classico rag\xF9 di carne macinata con soffritto, vino rosso e passata, cotto lentamente.",ingredients:["400 g - Macinato di manzo","200 g - Passata di pomodoro","60 g - Sedano","60 g - Carote","60 g - Cipolle","1 bicchiere - Vino rosso","3 cucchiai - Olio d'oliva","Q.B - Sale","Q.B - Pepe"],steps:["Tritare finemente cipolla, sedano e carote mentre l'olio si riscalda in una casseruola.","Mettere il trito di verdure nella casseruola e lasciare appassire il battuto lentamente a calore medio-basso.","Unire la carne macinata e lasciare cuocere per 10 minuti, poi aggiungere il vino rosso e lasciare evaporare l'alcol.","Versare anche la passata di pomodoro.","Coprire con il coperchio e cuocere a fuoco medio-basso per 2 ore, mescolando di tanto in tanto.","A met\xE0 cottura regolare di sale e pepe.","A fine cottura il rag\xF9 dovr\xE0 risultare di un bel colore arancione scuro."],notes:"In aggiunta, si possono utilizzare 150 g di pancetta fresca prima del trito di verdure per aggiungere sapore. Se il rag\xF9 sembra un po' secco, \xE8 possibile aggiungere del brodo vegetale per renderlo pi\xF9 liquido.",image:null},{id:9004,custom:!0,mealType:"Pranzo/Cena",name:"Pasta e pomodorini",time:"20 min",difficulty:"Facile",description:"Spaghetti mantecati con sugo di pomodorini datterini freschi, aglio e basilico.",ingredients:["500 g - Pomodorini datterini","400 g - Spaghetti","1 ciuffo - Basilico","1 spicchio - Aglio","Q.B - Olio d'oliva","Q.B - Parmigiano","Q.B - Sale"],steps:["Mettere sul fuoco una pentola con l'acqua per cuocere la pasta; al bollore salare.","Lavare i pomodorini e dividerli a met\xE0.","In un tegame versare l'olio e scaldare; aggiungere l'aglio intero sbucciato e soffriggere.","Aggiungere i datterini e cuocere a fuoco medio per circa 10 minuti.","Nel frattempo lessare gli spaghetti al dente.","Una volta pronto il sugo, aggiungere parte delle foglioline di basilico.","Scolare gli spaghetti al dente conservando un paio di mestoli di acqua di cottura.","A fuoco medio-basso terminare la cottura in tegame, mantecando gli spaghetti con il sugo, aggiungendo acqua di cottura se necessario."],notes:"La stessa procedura vale per una semplice pasta al pomodoro, basta utilizzare una passata di pomodoro o i pomodori pelati (molto meglio i pelati, fidati).",image:null},{id:9005,custom:!0,mealType:"Pranzo/Cena",name:"Pasta Aglio, Olio e Peperoncino",time:"20 min",difficulty:"Facile",description:"Spaghetti classici con aglio dorato, olio extravergine e peperoncino.",ingredients:["400 g - Spaghetti","4 spicchi - Aglio","Q.B - Olio d'oliva","Q.B - Peperoncino","Q.B - Sale"],steps:["Mettere sul fuoco una pentola con l'acqua per cuocere la pasta; al bollore salare.","Sbucciare l'aglio e tagliarlo a fettine sottili.","In un tegame versare l'olio e scaldare; aggiungere l'aglio e soffriggere.","Aggiungere un po' di peperoncino in polvere e continuare a soffriggere l'aglio.","Scolare gli spaghetti al dente conservando un paio di mestoli di acqua di cottura.","A fuoco medio-basso terminare la cottura in tegame con l'olio, aggiungendo acqua di cottura se necessario."],notes:"Non esagerare con il peperoncino. Il piccante non deve sovrastare il sapore dell'aglio.",image:null},{id:9006,custom:!0,mealType:"Antipasti",name:"Cr\xEApe Salate",time:"25 min",difficulty:"Facile",description:"Cr\xEApe farcite con uovo, Emmental, rucola e prosciutto crudo.",ingredients:["500 g - Latte intero","250 g - Farina 00","40 g - Burro","3 - Uova medie","Q.B - Uova medie (per farcire)","Q.B - Prosciutto crudo","Q.B - Emmental","Q.B - Rucola"],steps:["In una ciotola sbattere le uova, aggiungere il latte e mescolare fino a ottenere un composto omogeneo.","Unire il burro fuso e mescolare.","Setacciare la farina nella ciotola e incorporarla mescolando con una frusta fino a eliminare i grumi.","Scaldare una crepiera (o padella antiaderente) e ungerla con burro.","Versare un mestolo di impasto e distribuirlo uniformemente. Cuocere 1 minuto a fuoco medio-basso su entrambi i lati.","Dopo la cottura, aggiungere un uovo, i pezzi di Emmental, rucola e il prosciutto.","Attendere che l'uovo si cuocia, aggiustare di sale e pepe.","Piegare i lati della cr\xEApe, schiacciando leggermente per mantenerla chiusa (fare attenzione a non coprire il tuorlo). Rimuovere dal fuoco."],notes:"In alternativa alla farcitura indicata, \xE8 possibile utilizzare altre farciture a piacere.",image:null},{id:9007,custom:!0,mealType:"Dolci",name:"Crostata",time:"1 h 20 min",difficulty:"Media",description:"Crostata classica con pasta frolla e marmellata, coperta con strisce di impasto.",ingredients:["500 g - Farina 00","200 g - Zucchero a velo","250 g - Burro","2 - Uova medie","500 g - Marmellata"],steps:["Mescolare la farina e il burro freddo a pezzetti, fino a ottenere un composto sabbioso.","Aggiungere lo zucchero a velo e le uova leggermente sbattute. Mescolare per amalgamare.","Lasciare rassodare in frigorifero per circa 1 ora.","Stendere una parte della pasta col mattarello su una teglia e punzecchiare il fondo con una forchetta. Creare i bordi.","Farcire la crostata con la marmellata e coprire con delle strisce di impasto.","Cuocere in forno statico sul ripiano basso a 170\xB0C per 50 minuti."],notes:"Con l'avanzo dell'impasto si possono fare dei biscotti di diverse misure, che in pochi minuti in forno saranno pronti.",image:null},{id:9008,custom:!0,mealType:"Dolci",name:"Crostata di Fichi, Cioccolato e Noci",time:"1 h 20 min",difficulty:"Media",description:"Crostata con pasta frolla farcita con marmellata di fichi, cioccolato fondente e noci.",ingredients:["500 g - Farina 00","200 g - Zucchero a velo","250 g - Burro","2 - Uova medie","500 g - Marmellata di fichi","100 g - Cioccolato fondente","Q.B - Noci","Q.B - Fichi"],steps:["Mescolare la farina e il burro freddo a pezzetti, fino a ottenere un composto sabbioso.","Aggiungere lo zucchero a velo e le uova leggermente sbattute. Mescolare per amalgamare.","Lasciare rassodare in frigorifero per circa 1 ora.","Stendere una parte della pasta col mattarello su una teglia e punzecchiare il fondo con una forchetta. Creare i bordi.","Tagliare finemente il cioccolato e spezzettare le noci. Mischiarli insieme alla marmellata di fichi.","Farcire la crostata, coprire con strisce di impasto e disporre sopra i fichi tagliati.","Cuocere in forno statico sul ripiano basso a 170\xB0C per 50 minuti."],notes:null,image:null},{id:9009,custom:!0,mealType:"Dolci",name:"Torta Pere e Cioccolato",time:"1 h 15 min",difficulty:"Media",description:"Torta soffice al cioccolato fondente con pere disposte sopra l'impasto.",ingredients:["200 g - Farina 00","100 g - Zucchero","170 g - Burro","200 g - Cioccolato fondente","4 - Uova","5 - Pere","8 g - Lievito per dolci"],steps:["Tritare il cioccolato fondente e scioglierlo a bagnomaria. Una volta fuso, spegnere il fuoco e unire il burro a temperatura ambiente.","Separare gli albumi e i tuorli in 2 ciotole e montare gli albumi fino a ottenere una spuma morbida.","Aggiungere lo zucchero ai tuorli e montare il composto. Versare a filo il cioccolato fuso.","Setacciare farina e lievito nella ciotola e mescolare bene il tutto.","Incorporare gli albumi mescolando energicamente.","Versare l'impasto in una tortiera imburrata e disporre sopra le pere tagliate.","Cuocere in forno statico a 180\xB0C per circa 45 minuti. Fare la prova dello stecchino prima di sfornare."],notes:"Le pere possono essere inserite anche all'interno della torta, tenendo da parte met\xE0 dell'impasto e versandolo dopo aver disposto le pere all'interno della tortiera.",image:null},{id:9010,custom:!0,mealType:"Dolci",name:"Torta Caprese",time:"1 h 15 min",difficulty:"Media",description:"Dolce tipico di Capri, senza farina, umido e fondente con cioccolato, mandorle e nocciole.",ingredients:["170 g - Zucchero a velo","170 g - Burro ammorbidito","5 - Uova","170 g - Cioccolato fondente","85 g - Mandorle pelate in polvere","85 g - Nocciole spellate in polvere","25 g - Fecola di patate","14 g - Cacao amaro","4 g - Lievito in polvere","1 baccello - Vaniglia (semi)","1 pizzico - Sale fino"],steps:["Montare il burro con met\xE0 dello zucchero e i semi di vaniglia fino a ottenere una crema spumosa; aggiungere un pizzico di sale e incorporare gradualmente i tuorli.","Montare gli albumi con lo zucchero a velo rimasto fino a ottenere una massa lucida e soffice.","Ridurre le mandorle e le nocciole in polvere e grattugiare il cioccolato.","In una ciotola mescolare mandorle, nocciole, cioccolato, cacao, fecola e lievito.","Incorporare gli albumi montati al composto, alternandoli con le polveri e mescolando dal basso verso l'alto con delicatezza.","Cuocere in forno ventilato a 170\xB0C per circa 45 minuti.","Spolverare la superficie con zucchero a velo prima di servire."],notes:"Dolce tipico dell'isola di Capri, nato da un errore di un pasticcere che dimentic\xF2 la farina: da qui la sua consistenza umida, fondente e naturalmente senza glutine.",image:null},{id:9011,custom:!0,mealType:"Dolci",name:"Tiramis\xF9",time:"40 min",difficulty:"Media",description:"Il classico tiramis\xF9 con crema di mascarpone, savoiardi al caff\xE8 e cacao.",ingredients:["500 g - Mascarpone","300 g - Savoiardi","100 g - Zucchero","4 - Uova","Q.B - Caff\xE8","Q.B - Cacao amaro"],steps:["Preparare il caff\xE8 e lasciare raffreddare.","Separare tuorli e albumi. Montare i tuorli con met\xE0 dello zucchero fino a ottenere un composto chiaro.","Incorporare ai tuorli il mascarpone poco alla volta.","Montare gli albumi con il resto dello zucchero a neve ferma.","Unire un po' di albumi alla crema di tuorli e mascarpone per stemperare, poi aggiungere il resto delicatamente.","Stendere uno strato di crema nella teglia. Inzuppare velocemente i savoiardi nel caff\xE8 e disporli sopra la crema.","Coprire con altra crema, poi savoiardi, e terminare con crema.","Spolverare con cacao. Riporre in frigo almeno 2 ore."],notes:null,image:null},{id:9012,custom:!0,mealType:"Dolci",name:"Panna Cotta",time:"35 min",difficulty:"Facile",description:"Panna cotta alla vaniglia con gelatina, da servire capovolta con coulis di frutti rossi.",ingredients:["500 g - Panna fresca liquida","80 g - Zucchero","8 g - Gelatina in fogli (4 fogli da 2 g)","1 - Baccello di vaniglia","Q.B - Coulis di frutti rossi (opzionale)","Q.B - Frutta fresca (opzionale)","Q.B - Scaglie di cioccolato (opzionale)"],steps:["Mettere a mollo i fogli di gelatina in acqua fredda per 10-15 minuti.","Incidere il baccello di vaniglia e prelevare i semi.","In un pentolino unire la panna liquida con lo zucchero, i semi e il baccello di vaniglia. Scaldare a fuoco basso fino a sfiorare il bollore; togliere il baccello.","Scolare la gelatina ammorbidita e unirla al composto caldo; mescolare finch\xE9 non si scioglie completamente.","Versare il composto negli stampini (150 ml ciascuno). Lasciare raffreddare a temperatura ambiente, poi trasferire in frigorifero per almeno 5 ore.","Al momento di servire, immergere gli stampini per qualche istante in acqua calda, poi capovolgere su un piatto.","Guarnire con coulis di lamponi, frutta fresca o scaglie di cioccolato a piacere."],notes:null,image:null},{id:9013,custom:!0,mealType:"Dolci",name:"Torta di Lime",time:"1 h 15 min",difficulty:"Media",description:"Torta fresca con base di biscotti, crema al latte condensato e lime, con panna montata.",ingredients:["395 g - Latte condensato","200 ml - Panna da montare","200 g - Biscotti digestivi","100 g - Zucchero","100 g - Burro","4 - Lime","Q.B - Scorza di lime","3 - Uova (solo albume, per la meringa opzionale)","Q.B - Zucchero (per la meringa opzionale)"],steps:["Tritare finemente i biscotti e mescolare con il burro fuso.","Foderare fondo e bordi di uno stampo con il composto di biscotti, pressare bene.","Cuocere in forno preriscaldato a 200\xB0C per circa 20 minuti, finch\xE9 leggermente dorata. Lasciare raffreddare completamente.","Montare la panna. Mescolare il latte condensato con il succo di lime fino a ottenere una crema densa.","Incorporare la panna montata alla crema. Versare sulla base cotta e raffreddata.","Livellare, decorare con scorza di lime. Riporre in frigo almeno 2 ore prima di servire."],notes:"Per la versione con la meringa: montare 3 albumi con mezza tazza di zucchero fino a neve ferma. Coprire la torta con la meringa, cuocere in forno caldo per circa 10 minuti finch\xE9 dorata. Servire ben fredda.",image:null},{id:9014,custom:!0,mealType:"Dolci",name:"Cr\xEApe Dolce",time:"25 min",difficulty:"Facile",description:"Cr\xEApe dolci farcite con zucchero e succo di limone, leggere e profumate.",ingredients:["500 g - Latte intero","250 g - Farina 00","40 g - Burro","3 - Uova medie","Q.B - Zucchero (per farcire)","Q.B - Succo di limone (per farcire)"],steps:["In una ciotola sbattere le uova, aggiungere il latte e mescolare fino a ottenere un composto omogeneo.","Unire il burro fuso e mescolare.","Setacciare la farina nella ciotola e incorporarla mescolando con una frusta fino a eliminare i grumi.","Scaldare una crepiera (o padella antiaderente) e ungerla con burro.","Versare un mestolo di impasto e distribuirlo uniformemente. Cuocere 1 minuto a fuoco medio-basso su entrambi i lati.","Dopo la cottura, aggiungere velocemente lo zucchero e il succo di limone.","Piegare la cr\xEApe e rimuovere dal fuoco."],notes:"In alternativa alla farcitura indicata, \xE8 possibile utilizzare altre farciture a piacere.",image:null},{id:9015,custom:!0,mealType:"Dolci",name:"Biscotti di Natale (Gingerbread)",time:"1 h 5 min",difficulty:"Media",description:"Biscotti speziati natalizi con zenzero, cannella e chiodi di garofano, decorati con glassa.",ingredients:["350 g - Farina 00","160 g - Zucchero","110 g - Burro","1 - Uovo","50 g - Miele","5 g - Zenzero in polvere","5 g - Cannella in polvere","1 cucchiaino - Bicarbonato","1 pizzico - Chiodi di garofano macinati","1 pizzico - Noce moscata","1 pizzico - Sale fino","150 g - Zucchero a velo (per glassa)","1 - Albume (per glassa)"],steps:["In una ciotola mescolare farina, spezie, bicarbonato e sale.","In un'altra ciotola lavorare burro, zucchero e miele fino a ottenere un composto cremoso.","Aggiungere l'uovo e poi gli ingredienti secchi. Impastare fino a formare una palla liscia.","Avvolgere l'impasto nella pellicola e far riposare in frigo per circa 1 ora.","Stendere la pasta a 5 mm di spessore e ritagliare i biscotti con le formine.","Disporli su una teglia con carta forno e cuocere a 180\xB0C per 12-15 minuti.","Per la glassa: montare l'albume e incorporare gradualmente lo zucchero a velo. Trasferire in un sac-\xE0-poche e decorare i biscotti a piacere."],notes:null,image:null},{id:9016,custom:!0,mealType:"Dolci",name:"Cookies",time:"1 h",difficulty:"Facile",description:"Cookies morbidi con gocce di cioccolato fondente, croccanti fuori e soffici dentro.",ingredients:["250 g - Farina 00","90 g - Zucchero","90 g - Zucchero di canna","150 g - Burro","1 - Uovo","200 g - Gocce di cioccolato fondente","5 g - Lievito","1 pizzico - Sale fino"],steps:["In una ciotola mescolare lo zucchero e lo zucchero di canna con il burro morbido fino ad amalgamare.","Aggiungere l'uovo intero e continuare a mescolare fino a ottenere un composto omogeneo.","In un'altra ciotola setacciare la farina con il lievito e il sale. Versare le polveri nel composto di burro e mescolare con una spatola.","Aggiungere le gocce di cioccolato e amalgamare.","Coprire con pellicola e far rassodare in frigorifero per 30 minuti.","Formare delle palline da circa 50 g ciascuna senza compattarle troppo. Disporle su una teglia con carta forno, ben distanziate.","Cuocere in forno statico preriscaldato a 165\xB0C per 25-30 minuti nella griglia centrale."],notes:null,image:null},{id:9017,custom:!0,mealType:"Dolci",name:"Banana Bread",time:"1 h",difficulty:"Facile",description:"Pane dolce alle banane mature con gocce di cioccolato, soffice e profumato.",ingredients:["450 g (circa 4) - Banane mature","200 g - Farina 00","120 g - Zucchero","120 g - Burro morbido","2 - Uova","100 g - Gocce di cioccolato fondente","6 g - Lievito","3 g - Bicarbonato","1 cucchiaino - Cannella","1 pizzico - Sale fino"],steps:["Sbucciare le banane e ridurle in purea con una forchetta.","Lavorare il burro morbido con lo zucchero usando le fruste fino a ottenere una crema omogenea; aggiungere le uova una alla volta.","Aggiungere la purea di banane e mescolare con una spatola per amalgamare.","Setacciare farina, lievito, bicarbonato, cannella e sale; incorporare le polveri mescolando delicatamente, e alla fine unire le gocce di cioccolato.","Versare l'impasto nello stampo imburrato e infarinato, livellare la superficie e praticare un'incisione al centro con un coltello.","Cuocere in forno statico preriscaldato a 180\xB0C per circa 60 minuti."],notes:null,image:null},{id:9018,custom:!0,mealType:"Dolci",name:"Torta Pernk",time:"55 min",difficulty:"Media",description:"Torta speziata con cacao, miele e mix di spezie pernk, glassata con marmellata e cioccolato.",ingredients:["300 g - Farina 00","200 g - Zucchero","250 ml - Latte tiepido","100 ml - Olio di semi di girasole","2 - Uova","20 g - Cacao amaro","40 g - Miele","4 g - Mix di spezie pernk","8 g - Lievito","1 pizzico - Sale","150 g - Marmellata (per la finitura)","120 g - Cioccolato fondente (per la finitura)","20 g - Burro (per la finitura)"],steps:["In una ciotola montare le uova con lo zucchero fino a ottenere un composto chiaro e spumoso.","Aggiungere miele, olio e latte, mescolando bene con una frusta.","In un'altra ciotola setacciare farina, cacao, lievito, sale e spezie.","Unire gradualmente gli ingredienti secchi a quelli liquidi, mescolando fino a ottenere una pastella liscia.","Cuocere in forno statico a 180\xB0C per circa 30 minuti.","Spalmare la marmellata sulla superficie ancora tiepida in uno strato uniforme.","Sciogliere il cioccolato con il burro a bagnomaria e versarlo sopra la marmellata."],notes:"Mix spezie pernk (fatta in casa): 1 cucchiaino cannella + \xBD cucchiaino chiodi di garofano + \xBD cucchiaino anice + \xBD cucchiaino zenzero + \xBD cucchiaino noce moscata + scorza di limone grattugiata.",image:null}]),[s,y]=(0,o.useState)(null);(0,o.useEffect)(()=>{let m=$c("pantry",tg),v=$c("groceryList",lg),T=$c("customRecipes",null);a(m),i(v),T!==null&&h(T),t(!0)},[]);let x=(0,o.useCallback)(m=>{a(v=>{let T=typeof m=="function"?m(v):m;return Ic("pantry",T),T})},[]),E=(0,o.useCallback)(m=>{i(v=>{let T=typeof m=="function"?m(v):m;return Ic("groceryList",T),T})},[]),O=(0,o.useCallback)(m=>{h(v=>{let T=typeof m=="function"?m(v):m;return Ic("customRecipes",T),T})},[]),p=(0,o.useCallback)((m,v)=>{y({message:m,onUndo:v})},[]),r="'Palatino Linotype','Book Antiqua',Palatino,serif";return e?o.default.createElement("div",{style:{minHeight:"100vh",background:"#0a0a0a",fontFamily:r,color:"#e8ddd0"}},s&&o.default.createElement(ag,{message:s.message,onUndo:()=>{s.onUndo(),y(null)},onDismiss:()=>y(null)}),o.default.createElement("div",{className:"app-header",style:{padding:"32px 28px 24px",borderBottom:"1px solid #161616"}},o.default.createElement("div",{style:{maxWidth:900,margin:"0 auto",display:"flex",alignItems:"flex-end",justifyContent:"space-between"}},o.de
